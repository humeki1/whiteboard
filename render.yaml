services:
  - type: web
    name: whiteboard-server
    env: node
    rootDir: server
    buildCommand: npm ci && npm run build
    startCommand: node dist/index.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        sync: false  # デプロイ後にダッシュボードでwhiteboard（静的サイト）のURLを設定

  - type: web
    name: whiteboard
    env: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    plan: free
    envVars:
      - key: VITE_SERVER_URL
        sync: false  # デプロイ後にダッシュボードでwhiteboard-serverのURLを設定
